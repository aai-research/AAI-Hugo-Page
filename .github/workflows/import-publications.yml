name: Import Publications From Bibtex

on:
  push:
    branches: ['aai-first-version']
    paths:
      - 'publications.bib'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: import-publications-${{ github.ref }}
  cancel-in-progress: true

jobs:
  import:
    if: github.repository_owner != 'HugoBlox'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-academic
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Academic CLI
        run: |
          python -m pip install --upgrade pip
          pip install "academic>=0.10.0"

      - name: Validate Bib file
        run: |
          test -f publications.bib || (echo "❌ publications.bib not found" && exit 1)

      - name: Run Academic import
        run: |
          academic import publications.bib content/publication/ --compact --verbose

      - name: Fix author field
        run: |
          if [ -d "content/publication" ]; then
            find content/publication -name "index.md" -type f -exec sed -i 's/^author:/authors:/g' {} +
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add content/publications/

          git commit -m "auto: update publication from bibtex" || echo "No changes"

          git push
