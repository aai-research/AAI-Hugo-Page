name: Import Publications From Bibtex

on:
  push:
    branches: ['aai-first-version']
    paths:
      - 'publications.bib'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: import-publications-${{ github.ref }}
  cancel-in-progress: true

jobs:
  import:
    if: github.repository_owner != 'HugoBlox'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-academic
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Academic CLI + deps
        run: |
          python -m pip install --upgrade pip
          pip install "academic>=0.10.0" pyyaml

      - name: Validate Bib file
        run: |
          test -f publications.bib || (echo "❌ publications.bib not found" && exit 1)

      - name: Run Academic import
        run: |
          academic import publications.bib content/publication/ --compact --verbose

      - name: Fix author field name
        run: |
          if [ -d "content/publication" ]; then
            find content/publication -name "index.md" -type f -exec sed -i 's/^author:/authors:/g' {} +
          fi

      - name: Fix authors properly (AND / and etc.)
        run: |
          python << 'EOF'
          import os
          import yaml
          import re

          base = "content/publication"

          for root, dirs, files in os.walk(base):
              for f in files:
                  if f == "index.md":
                      path = os.path.join(root, f)

                      with open(path, "r", encoding="utf-8") as file:
                          content = file.read()

                      if not content.startswith("---"):
                          continue

                      parts = content.split("---")
                      if len(parts) < 3:
                          continue

                      frontmatter = yaml.safe_load(parts[1])

                      if "authors" in frontmatter:
                          raw = frontmatter["authors"]

                          if isinstance(raw, list) and len(raw) == 1:
                              raw = raw[0]

                          if isinstance(raw, str):
                              authors = [a.strip() for a in re.split(r"\s+(?i:and)\s+", raw)]
                          
                              clean = []
                              for a in authors:
                                  a = a.strip()
                          
                                  # entferne kaputte Zeilenumbrüche etc.
                                  a = " ".join(a.split())
                          
                                  if "," in a:
                                      parts = [p.strip() for p in a.split(",", 1)]
                          
                                      if len(parts) == 2:
                                          last, first = parts
                                          clean.append(f"{first} {last}")
                                      else:
                                          clean.append(a)
                                  else:
                                      clean.append(a)

                              frontmatter["authors"] = clean

                              new_frontmatter = yaml.dump(
                                  frontmatter,
                                  allow_unicode=True,
                                  sort_keys=False,
                                  default_flow_style=False
                              )

                              new_content = "---\n" + new_frontmatter + "---" + parts[2]

                              with open(path, "w", encoding="utf-8") as file:
                                  file.write(new_content)

          print("✅ Authors fixed")
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add content/publication/

          git commit -m "auto: update publication from bibtex" || echo "No changes"

          git push
