name: Import Publications From Bibtex

on:
  push:
    branches: ['aai-first-version']
    paths:
      - 'publications.bib'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: import-publications-${{ github.ref }}
  cancel-in-progress: true

jobs:
  import:
    if: github.repository_owner != 'HugoBlox'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-academic
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Academic CLI
        run: |
          python -m pip install --upgrade pip
          pip install "academic>=0.10.0"

      - name: Validate Bib file exists
        run: |
          test -f publications.bib || (echo "❌ publications.bib missing" && exit 1)

      - name: Run Academic import
        run: |
          academic import publications.bib content/publications/ --compact --verbose

      - name: Fix author field
        run: |
          find content/publications -name "index.md" -type f -exec sed -i 's/^author:/authors:/g' {} +

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "auto: import publications from bibtex"
          title: "📚 Import latest publications"
          body: |
            Automated import from publications.bib
          branch: bibtex-import-${{ github.run_id }}
          base: aai-first-version
          delete-branch: true
          labels: automated, publications
