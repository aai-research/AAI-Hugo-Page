name: Import Publications From Bibtex

on:
  push:
    branches: ['aai-first-version']
    paths:
      - 'publications.bib'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    if: github.repository_owner != 'HugoBlox'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install academic==0.10.0

      - name: Run Academic (Bibtex to Markdown)
        run: |
          if [ ! -f publications.bib ]; then
            echo "No publications.bib found, skipping."
            exit 0
          fi

          academic import publications.bib content/publication/ --compact --normalize
      - name: Commit generated publications
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add content/publication/

          git commit -m "auto: import publications from bibtex" || echo "No changes to commit"

          git push
