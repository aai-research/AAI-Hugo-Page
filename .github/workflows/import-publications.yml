name: Import Publications From Bibtex

on:
  push:
    branches: ['aai-first-version']
    paths:
      - 'publications.bib'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    if: github.repository_owner != 'HugoBlox'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install academic==0.10.0

      - name: Run Academic (Bibtex to Markdown)
        run: |
          if [ ! -f publications.bib ]; then
            echo "No publications.bib found, skipping."
            exit 0
          fi

          academic import publications.bib content/publication/ --compact --normalize

      - name: Generate author pages
        run: |
          python << 'EOF'
          import os
          import glob
          import re

          def slugify(name):
              return re.sub(r"[^a-z0-9]+", "-", name.lower()).strip("-")

          files = glob.glob("content/publication/*/index.md")
          authors = set()

          for f in files:
              with open(f, "r", encoding="utf-8") as file:
                  lines = file.readlines()

              in_authors = False

              for line in lines:
                  line = line.strip()

                  if line.startswith("authors:"):
                      in_authors = True
                      continue

                  if in_authors:
                      if line.startswith("- "):
                          authors.add(line.replace("- ", "").strip())
                      else:
                          break

          for author in authors:
              slug = slugify(author)
              path = f"content/authors/{slug}"
              os.makedirs(path, exist_ok=True)

              with open(f"{path}/_index.md", "w", encoding="utf-8") as f:
                  f.write(f"""---
title: "{author}"
---
""")

          print(f"Generated {len(authors)} authors")
          EOF

      - name: Commit generated publications and authors
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add content/publication/
          git add content/authors/

          git commit -m "auto: import publications from bibtex" || echo "No changes to commit"

          git push
