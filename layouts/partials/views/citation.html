{{ $page := . }}

<div class="publication-item">

  <!-- TITLE -->
  <h3 class="title">
    {{ $page.Title }}
  </h3>

  <!-- AUTHORS -->
  <div class="authors">
    {{ with $page.Params.authors }}
      {{ delimit . ", " }}
    {{ else }}
      <span style="color:red;">No authors</span>
    {{ end }}
  </div>

</div>
