{{/* Zugriff auf echte Page */}}
{{ $p := .Page }}

<div>

  {{ with $p.Params.authors }}
    <div>
      {{ range . }}
        <span>{{ . }}</span>
      {{ end }}
    </div>
  {{ else }}
    <div style="color:red;">NO AUTHORS FOUND (REAL PAGE)</div>
  {{ end }}

  <div>
    <strong>{{ $p.Title }}</strong>
  </div>

</div>
