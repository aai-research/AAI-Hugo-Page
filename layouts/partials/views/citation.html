{{/* FORCE RAW PARAMS ACCESS */}}

{{ $page := . }}

<div>

  {{ if isset $page.Params "authors" }}
    <div>
      {{ range $page.Params.authors }}
        <span>{{ . }}</span>
      {{ end }}
    </div>
  {{ else }}
    <div style="color:red;">NO AUTHORS FIELD</div>
  {{ end }}

  <div>
    <strong>{{ $page.Title }}</strong>
  </div>

</div>
