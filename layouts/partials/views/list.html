<article class="publication-item">

  <!-- TITLE -->
  <h3 class="title">
    {{ .Title }}
  </h3>

  <!-- DEBUG (wichtig!) -->
  {{ if .Params }}
    {{ if .Params.authors }}
      <div class="authors">
        {{ delimit .Params.authors ", " }}
      </div>
    {{ else }}
      <div style="color:red;">No authors (Params exists but empty)</div>
    {{ end }}
  {{ else }}
    <div style="color:red;">No Params at all</div>
  {{ end }}

</article>
