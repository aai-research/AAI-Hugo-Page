<div class="article-metadata">

  {{/* Standard Publication Info */}}
  {{ with .Params.publication }}
    <div class="pub-publication">
      {{ . | markdownify }}
    </div>
  {{ end }}

  {{/* DEINE AUTOREN */}}
  {{ with .Params.custom_authors }}
    <div class="pub-authors" style="font-size:0.9em; margin-top:4px;">
      {{ . }}
    </div>
  {{ end }}

</div>

<h3 class="article-title">
  {{ .Title }}
</h3>
