{{/* Custom authors fallback */}}

{{ if .Params.custom_authors }}
  <div style="font-size:0.9em;">
    {{ .Params.custom_authors }}
  </div>
{{ else if .Params.authors }}
  {{ partial "page_metadata_authors" . }}
{{ end }}

{{ with .Params.authors }}
  <div>
    {{ range . }}
      <span>{{ . }}</span>
    {{ end }}
  </div>
{{ end }}
