<div>
  {{ with .Params.authors }}
    {{ range . }}
      {{ $author := site.GetPage (printf "authors/%s" .) }}
      {{ if $author }}
        <span>{{ $author.Params.title }}</span>
      {{ else }}
        <span>{{ . }}</span>
      {{ end }}
    {{ end }}
  {{ else }}
    <span>NO AUTHORS FOUND</span>
  {{ end }}
</div>
